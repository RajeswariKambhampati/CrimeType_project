<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Law Enforcement Officer Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f1419 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            padding: 50px;
            border-radius: 10px;
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.2);
            width: 100%;
            max-width: 450px;
            border-top: 5px solid #00d4ff;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
            font-size: 48px;
        }
        h1 {
            text-align: center;
            color: #0f1419;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #00d4ff;
            margin-bottom: 30px;
            font-size: 14px;
            font-weight: bold;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #0f1419;
            font-weight: 600;
            font-size: 14px;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 8px rgba(0, 212, 255, 0.2);
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #00d4ff 0%, #00a8cc 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 212, 255, 0.3);
        }
        .default-creds {
            background-color: #e7f3ff;
            border: 1px solid #b3d9ff;
            border-left: 4px solid #00d4ff;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 25px;
            font-size: 13px;
            color: #004085;
        }
        .default-creds strong {
            display: block;
            margin-bottom: 8px;
            color: #00d4ff;
            font-size: 14px;
        }
        .default-creds div {
            margin: 5px 0;
            font-family: monospace;
        }
        .links {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }
        .links a {
            display: block;
            color: #00d4ff;
            text-decoration: none;
            margin: 10px 0;
            font-size: 14px;
            transition: color 0.3s ease;
        }
        .links a:hover {
            color: #00a8cc;
            text-decoration: underline;
        }
        .messages {
            margin-bottom: 20px;
        }
        .alert {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .alert-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🚔</div>
        <h1>Law Enforcement Officer</h1>
        <p class="subtitle">SECURE COMMAND CENTER ACCESS</p>
        
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="alert alert-{% if message.tags %}{{ message.tags }}{% else %}info{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        
        <div class="default-creds">
            <strong>Demo Officer Credentials:</strong>
            <div>Username: <strong>Admin</strong></div>
            <div>Password: <strong>Admin</strong></div>
        </div>
        
        <form method="post" action="">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Officer ID / Username:</label>
                <input type="text" id="username" name="username" placeholder="Enter your officer ID" required>
            </div>
            <div class="form-group">
                <label for="password">Secure Password:</label>
                <input type="password" id="password" name="password" placeholder="Enter your secure password" required>
            </div>
            <button type="submit">AUTHORIZE ACCESS</button>
        </form>
        
        <div class="links">
            <a href="{% url 'index' %}">Back to Home</a>
        </div>
    </div>
</body>
</html>
