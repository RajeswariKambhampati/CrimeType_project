<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Profile</title>
</head>
<body>
    <h1>Your Profile</h1>
    <p><strong>Username:</strong> {{ object.username }}</p>
    <p><strong>Email:</strong> {{ object.email }}</p>
    <p><strong>Phone:</strong> {{ object.phoneno }}</p>
    <p><strong>Country:</strong> {{ object.country }}</p>
    <p><strong>State:</strong> {{ object.state }}</p>
    <p><strong>City:</strong> {{ object.city }}</p>
    <p><a href="{% url 'Add_DataSet_Details' %}">Upload Dataset</a></p>
</body>
</html>
